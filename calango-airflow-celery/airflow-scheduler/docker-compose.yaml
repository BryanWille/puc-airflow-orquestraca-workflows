name: airflow-scheduler

x-airflow-common: &airflow-common
  image: calango-airflow:2.10.5
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0

    AIRFLOW__WEBSERVER__SECRET_KEY: calango-secret-key

    AIRFLOW_CONN_CALANGO_POSTGRES: postgres://airflow:airflow@airflow-postgres:5432/calango

  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs

  networks:
    - airflow-net

services:
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - airflow-net

  airflow-redis:
    image: redis:7
    container_name: airflow-redis
    ports:
      - "6379:6379"
    networks:
      - airflow-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      - airflow-postgres
      - airflow-redis
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Bryan
      --lastname Wille
      --role Admin
      --email admin@example.com || true
      "

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    ports:
      - "5081:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    command: scheduler

  airflow-flower:
    <<: *airflow-common
    container_name: airflow-flower
    depends_on:
      - airflow-init
    ports:
      - "5555:5555"
    command: celery flower

volumes:
  postgres_data:
  airflow_logs:

networks:
  airflow-net:
    name: airflow-scheduler_airflow-net
